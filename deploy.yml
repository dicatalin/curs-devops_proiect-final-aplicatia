---
- name: Deploy to Staging
  hosts: all
  become: yes  # Adăugat dacă utilizatorul SSH nu are drepturi directe de docker
  
  tasks:
    - name: Login to GitHub Packages
      community.docker.docker_login:
        registry_url: ghcr.io
        username: "{{ gh_user }}"
        password: "{{ gh_pat }}"
        reauthorize: yes # Forțează re-autentificarea pentru a evita token-uri expirate

    - name: Pull the specific build image
      community.docker.docker_image:
        # Verifică dacă image_to_deploy are deja ghcr.io/. Dacă nu, lasă-l așa:
        name: "ghcr.io/{{ image_to_deploy }}"
        source: pull
        force_source: yes # Forțează pull-ul chiar dacă imaginea există local
      register: pull_result

    - name: Run the container
      community.docker.docker_container:
        name: web
        image: "ghcr.io/{{ image_to_deploy }}"
        state: started
        recreate: yes
        pull: yes # Mai o verificare extra pentru pull la nivel de container
        restart_policy: always
        published_ports:
          - "8000:8000"
        env:
          DB_NAME: "{{ lookup('env', 'DB_NAME') }}"
          DB_USER: "{{ lookup('env', 'DB_USER') }}"
          DB_PASS: "{{ lookup('env', 'DB_PASS') }}"
          DB_HOST: "{{ lookup('env', 'DB_HOST') }}"
        command: >
          sh -c "python3 manage.py migrate --noinput && 
                 python3 manage.py runserver 0.0.0.0:8000"

    - name: Clean up old images
      community.docker.docker_prune:
        images: yes
        images_filters:
          dangling: false # Opțional: curăță imaginile vechi/nefolosite