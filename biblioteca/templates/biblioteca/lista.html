<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestiune Bibliotecă</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h2 class="mb-0">📚 Catalog Cărți</h2>
            <a href="/admin/biblioteca/book/add/" class="btn btn-light btn-sm">+ Adaugă Carte</a>
        </div>
        
        <div class="card-body">
            <div class="mb-3">
                <input type="text" id="searchInput" class="form-control" placeholder="Caută după titlu sau autor...">
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle" id="booksTable">
                    <thead class="table-light">
                        <tr>
                            <th>Titlu</th>
                            <th>Autor</th>
                            <th>ISBN</th>
                            <th class="text-center">An</th>
                            <th class="text-end">Acțiuni</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for carte in carti %}
                        <tr>
                            <td class="fw-bold text-dark">{{ carte.title }}</td>
                            <td>{{ carte.author }}</td>
                            <td><span class="badge bg-secondary">{{ carte.isbn }}</span></td>
                            <td class="text-center">{{ carte.publish_year }}</td>
                            <td class="text-end">
                                <a href="/admin/biblioteca/book/{{ carte.id }}/change/" class="btn btn-outline-warning btn-sm">Edit</a>
                                <a href="/admin/biblioteca/book/{{ carte.id }}/delete/" class="btn btn-outline-danger btn-sm">Șterge</a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="5" class="text-center py-4 text-muted">Nu am găsit nicio carte în bibliotecă.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('searchInput').addEventListener('keyup', function() {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll('#booksTable tbody tr');
        
        rows.forEach(row => {
            let text = row.innerText.toLowerCase();
            row.style.display = text.includes(filter) ? '' : 'none';
        });
    });
</script>

</body>
</html>
